version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clouddrive-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clouddrive
      POSTGRES_USER: clouddrive_user
      POSTGRES_PASSWORD: clouddrive_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
