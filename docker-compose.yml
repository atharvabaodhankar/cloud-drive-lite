services:
  postgres:
    image: postgres:15-alpine
    container_name: clouddrive-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clouddrive
      POSTGRES_USER: clouddrive_user
      POSTGRES_PASSWORD: clouddrive_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: clouddrive-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: clouddrive-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
